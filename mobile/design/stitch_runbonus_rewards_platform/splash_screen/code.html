<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Geist:wght@100;300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(120px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .animate-orbit {
            animation: orbit 4s linear infinite;
        }
        .glass-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#e2e2e2",
                        "tertiary-fixed": "#e5e2e1",
                        "surface-container-highest": "#353535",
                        "on-primary-fixed": "#161e00",
                        "on-secondary": "#313030",
                        "on-primary-fixed-variant": "#3c4d00",
                        "surface-dim": "#131313",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-on-surface": "#303030",
                        "outline": "#8e9379",
                        "tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#474646",
                        "on-surface-variant": "#c4c9ac",
                        "on-surface": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#474746",
                        "primary": "#ffffff",
                        "secondary-container": "#4a4949",
                        "primary-fixed": "#c3f400",
                        "secondary": "#c8c6c5",
                        "on-background": "#e2e2e2",
                        "error-container": "#93000a",
                        "on-primary": "#283500",
                        "primary-container": "#c3f400",
                        "surface-container-low": "#1b1b1b",
                        "outline-variant": "#444933",
                        "on-secondary-container": "#bab8b7",
                        "on-tertiary-fixed": "#1c1b1b",
                        "on-tertiary-container": "#656464",
                        "on-error": "#690005",
                        "error": "#ffb4ab",
                        "surface-container": "#1f1f1f",
                        "surface-tint": "#abd600",
                        "background": "#131313",
                        "on-tertiary": "#313030",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface": "#131313",
                        "tertiary-container": "#e5e2e1",
                        "inverse-primary": "#506600",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-container": "#556d00",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed-dim": "#abd600",
                        "surface-container-high": "#2a2a2a",
                        "surface-bright": "#393939",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-variant": "#353535"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-padding": "24px",
                        "unit": "4px",
                        "gutter": "16px",
                        "container-margin": "24px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Space Grotesk"],
                        "body-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "display-lg": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "label-sm": ["Geist"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Splash Screen Container -->
<main class="relative w-full h-screen flex flex-col items-center justify-center px-container-margin">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary-fixed/5 rounded-full blur-[120px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary-fixed/10 rounded-full blur-[80px]"></div>
</div>
<!-- Central Brand Cluster -->
<div class="relative flex flex-col items-center">
<!-- Pulse Rings -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-primary-fixed/30 rounded-full animate-pulse-ring"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-primary-fixed/20 rounded-full animate-pulse-ring [animation-delay:1s]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-primary-fixed/10 rounded-full animate-pulse-ring [animation-delay:2s]"></div>
<!-- Orbiting Data Particle (High-Tech Effect) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full animate-orbit">
<div class="w-2 h-2 bg-primary-fixed rounded-full shadow-[0_0_15px_rgba(195,244,0,0.8)]"></div>
</div>
<!-- Logo Section -->
<div class="relative z-10 flex items-center justify-center mb-8">
<div class="p-6 bg-surface-container rounded-xl border border-outline-variant/30 glass-blur shadow-2xl">
<span class="material-symbols-outlined text-primary-fixed text-[80px] leading-none drop-shadow-[0_0_20px_rgba(195,244,0,0.4)]" data-icon="bolt">bolt</span>
</div>
</div>
<!-- Branding Text -->
<div class="text-center z-10 mt-4 opacity-0 animate-[fadeIn_1s_ease-out_forwards]">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed tracking-tighter uppercase mb-2">
                    RunBonus
                </h1>
<p class="font-headline-md text-headline-md-mobile text-on-surface-variant font-medium tracking-wide">
                    Run. Earn Bonuses.
                </p>
</div>
</div>
<!-- Loading Indicator / Footer Progress -->
<div class="absolute bottom-16 left-1/2 -translate-x-1/2 w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed w-0 transition-all duration-[3000ms] ease-out shadow-[0_0_10px_rgba(195,244,0,0.5)]" id="progress-bar"></div>
</div>
<!-- Technical Metadata (Bottom Right) -->
<div class="absolute bottom-6 right-container-margin opacity-30">
<p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant">
                v2.4.0 // Performance Node Active
            </p>
</div>
</main>
<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulate loading progress
            const progressBar = document.getElementById('progress-bar');
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 100);

            // Optional: Auto-redirect simulation after splash
            /*
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 3500);
            */
        });

        // Keyframe animations for Tailwind (if not already handled by custom CSS)
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
