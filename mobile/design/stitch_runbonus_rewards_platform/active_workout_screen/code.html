<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#e2e2e2",
                        "tertiary-fixed": "#e5e2e1",
                        "surface-container-highest": "#353535",
                        "on-primary-fixed": "#161e00",
                        "on-secondary": "#313030",
                        "on-primary-fixed-variant": "#3c4d00",
                        "surface-dim": "#131313",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-on-surface": "#303030",
                        "outline": "#8e9379",
                        "tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#474646",
                        "on-surface-variant": "#c4c9ac",
                        "on-surface": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#474746",
                        "primary": "#ffffff",
                        "secondary-container": "#4a4949",
                        "primary-fixed": "#c3f400",
                        "secondary": "#c8c6c5",
                        "on-background": "#e2e2e2",
                        "error-container": "#93000a",
                        "on-primary": "#283500",
                        "primary-container": "#c3f400",
                        "surface-container-low": "#1b1b1b",
                        "outline-variant": "#444933",
                        "on-secondary-container": "#bab8b7",
                        "on-tertiary-fixed": "#1c1b1b",
                        "on-tertiary-container": "#656464",
                        "on-error": "#690005",
                        "error": "#ffb4ab",
                        "surface-container": "#1f1f1f",
                        "surface-tint": "#abd600",
                        "background": "#131313",
                        "on-tertiary": "#313030",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface": "#131313",
                        "tertiary-container": "#e5e2e1",
                        "inverse-primary": "#506600",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-container": "#556d00",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed-dim": "#abd600",
                        "surface-bright": "#393939",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "surface-variant": "#353535"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-padding": "24px",
                        "unit": "4px",
                        "gutter": "16px",
                        "container-margin": "24px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Space Grotesk"],
                        "body-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "display-lg": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "label-sm": ["Geist"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .pulse-animation {
            animation: pulse-ring 2s infinite ease-in-out;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(27, 27, 27, 0.4);
            border: 1px solid rgba(195, 244, 0, 0.1);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(171, 214, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- Top App Bar (Suppressing Global Nav for focus) -->
<header class="w-full sticky top-0 z-40 backdrop-blur-xl bg-surface/80 border-b border-outline-variant/20 flex justify-between items-center px-container-margin py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-fixed" data-icon="bolt">bolt</span>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed uppercase tracking-tighter">RunBonus</h1>
</div>
<div class="flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant/30">
<span class="w-2 h-2 rounded-full bg-primary-fixed animate-pulse"></span>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Active Workout</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-margin">
<!-- Main Stats Container -->
<div class="w-full max-w-md flex flex-col items-center space-y-12">
<!-- Pulsing Ring Indicator -->
<div class="relative flex items-center justify-center">
<div class="absolute w-64 h-64 rounded-full border-4 border-primary-fixed/20 pulse-animation"></div>
<div class="absolute w-56 h-56 rounded-full border-2 border-primary-fixed/40"></div>
<!-- Central Icon -->
<div class="z-10 bg-surface-container-lowest p-6 rounded-full border border-primary-fixed/30 shadow-[0_0_30px_rgba(171,214,0,0.15)]">
<span class="material-symbols-outlined text-primary-fixed text-6xl" data-icon="directions_run" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
</div>
<!-- Big Timer -->
<div class="text-center">
<div class="font-display-lg text-display-lg text-primary tracking-tighter mb-2" id="timer">00:42:15</div>
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Elapsed Time</div>
</div>
<!-- Distance Stat Card -->
<div class="w-full glass-panel rounded-lg p-card-padding flex flex-col items-center shadow-lg">
<div class="flex items-baseline gap-2">
<span class="font-display-lg text-display-lg text-primary-fixed" id="distance">6.42</span>
<span class="font-headline-md text-headline-md text-on-surface-variant">km</span>
</div>
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-2">Current Distance</div>
</div>
<!-- Heart Rate / Minor Indicator -->
<div class="flex gap-8">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-error mb-1" data-icon="favorite">favorite</span>
<span class="font-headline-md text-headline-md">148</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">BPM</span>
</div>
<div class="w-[1px] h-12 bg-outline-variant/30"></div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary-fixed mb-1" data-icon="speed">speed</span>
<span class="font-headline-md text-headline-md">5'12"</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">PACE</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="p-container-margin pb-10 flex justify-center">
<button class="w-full max-w-md py-5 rounded-full bg-primary-fixed text-on-primary-fixed font-headline-md flex justify-center items-center gap-3 glow-button active:scale-95 transition-transform duration-200" id="finishBtn">
<span class="material-symbols-outlined" data-icon="stop_circle" style="font-variation-settings: 'FILL' 1;">stop_circle</span>
            FINISH WORKOUT
        </button>
</footer>
<!-- Subtle Background Atmosphere -->
<div class="fixed inset-0 -z-10 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-fixed/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary-fixed/5 blur-[120px] rounded-full"></div>
</div>
<script>
        // Minimal logic for the timer and distance increment simulation
        let seconds = 2535; // Starting at 42:15
        let distance = 6.42;
        
        const timerEl = document.getElementById('timer');
        const distanceEl = document.getElementById('distance');
        const finishBtn = document.getElementById('finishBtn');

        function updateUI() {
            seconds++;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            
            timerEl.innerText = [h, m, s]
                .map(v => v < 10 ? "0" + v : v)
                .join(":");
            
            // Randomly increment distance slightly to simulate movement
            if (Math.random() > 0.7) {
                distance += 0.01;
                distanceEl.innerText = distance.toFixed(2);
            }
        }

        const interval = setInterval(updateUI, 1000);

        finishBtn.addEventListener('click', () => {
            clearInterval(interval);
            finishBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> SAVING...';
            finishBtn.classList.remove('bg-primary-fixed');
            finishBtn.classList.add('bg-surface-container-high', 'text-on-surface');
            
            setTimeout(() => {
                alert('Workout Saved! Great performance, Elite Mover.');
                location.reload(); // Reset for demo purposes
            }, 1500);
        });
    </script>
</body></html>
