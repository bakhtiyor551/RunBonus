<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Geist:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes scan-line {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #c3f400, transparent);
            position: absolute;
            width: 100%;
            box-shadow: 0 0 15px 2px rgba(195, 244, 0, 0.5);
            animation: scan-line 3s linear infinite;
        }
        .scanner-corner {
            width: 32px;
            height: 32px;
            border-color: #c3f400;
            position: absolute;
        }
        .scanner-corner-tl { top: -2px; left: -2px; border-top-width: 4px; border-left-width: 4px; border-radius: 8px 0 0 0; }
        .scanner-corner-tr { top: -2px; right: -2px; border-top-width: 4px; border-right-width: 4px; border-radius: 0 8px 0 0; }
        .scanner-corner-bl { bottom: -2px; left: -2px; border-bottom-width: 4px; border-left-width: 4px; border-radius: 0 0 0 8px; }
        .scanner-corner-br { bottom: -2px; right: -2px; border-bottom-width: 4px; border-right-width: 4px; border-radius: 0 0 8px 0; }
        
        .camera-overlay {
            background: radial-gradient(circle, transparent 150px, rgba(19, 19, 19, 0.7) 150px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#e2e2e2",
                      "tertiary-fixed": "#e5e2e1",
                      "surface-container-highest": "#353535",
                      "on-primary-fixed": "#161e00",
                      "on-secondary": "#313030",
                      "on-primary-fixed-variant": "#3c4d00",
                      "surface-dim": "#131313",
                      "secondary-fixed": "#e5e2e1",
                      "inverse-on-surface": "#303030",
                      "outline": "#8e9379",
                      "tertiary": "#ffffff",
                      "on-secondary-fixed-variant": "#474646",
                      "on-surface-variant": "#c4c9ac",
                      "on-surface": "#e2e2e2",
                      "on-tertiary-fixed-variant": "#474746",
                      "primary": "#ffffff",
                      "secondary-container": "#4a4949",
                      "primary-fixed": "#c3f400",
                      "secondary": "#c8c6c5",
                      "on-background": "#e2e2e2",
                      "error-container": "#93000a",
                      "on-primary": "#283500",
                      "primary-container": "#c3f400",
                      "surface-container-low": "#1b1b1b",
                      "outline-variant": "#444933",
                      "on-secondary-container": "#bab8b7",
                      "on-tertiary-fixed": "#1c1b1b",
                      "on-tertiary-container": "#656464",
                      "on-error": "#690005",
                      "error": "#ffb4ab",
                      "surface-container": "#1f1f1f",
                      "surface-tint": "#abd600",
                      "background": "#131313",
                      "on-tertiary": "#313030",
                      "on-error-container": "#ffdad6",
                      "secondary-fixed-dim": "#c8c6c5",
                      "surface": "#131313",
                      "tertiary-container": "#e5e2e1",
                      "inverse-primary": "#506600",
                      "on-secondary-fixed": "#1c1b1b",
                      "on-primary-container": "#556d00",
                      "surface-container-lowest": "#0e0e0e",
                      "primary-fixed-dim": "#abd600",
                      "surface-container-high": "#2a2a2a",
                      "surface-bright": "#393939",
                      "tertiary-fixed-dim": "#c8c6c5",
                      "surface-variant": "#353535"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "card-padding": "24px",
                      "unit": "4px",
                      "gutter": "16px",
                      "container-margin": "24px"
              },
              "fontFamily": {
                      "display-lg-mobile": ["Space Grotesk"],
                      "body-md": ["Geist"],
                      "body-lg": ["Geist"],
                      "display-lg": ["Space Grotesk"],
                      "headline-md": ["Space Grotesk"],
                      "label-sm": ["Geist"]
              },
              "fontSize": {
                      "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden h-screen">
<!-- Top Navigation Bar -->
<header class="w-full sticky top-0 z-40 backdrop-blur-xl bg-surface/80 border-b border-outline-variant/20 flex justify-between items-center px-container-margin py-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 duration-200 text-on-surface-variant" onclick="history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-[20px] leading-tight text-primary-fixed uppercase tracking-tighter">RunBonus</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Camera View Container -->
<main class="relative h-[calc(100vh-72px)] w-full bg-surface-container-lowest overflow-hidden">
<!-- Mock Camera Background -->
<div class="absolute inset-0 z-0">
<img alt="High-performance athletic shoe with glowing details" class="w-full h-full object-cover opacity-60 grayscale-[0.3]" data-alt="A professional, high-angle cinematic photograph of a futuristic RunBonus running shoe resting on a polished dark obsidian surface. The lighting is moody and dramatic with high-contrast shadows, emphasizing the technical mesh and neon green accents of the footwear. A faint blue and green ambient glow surrounds the shoe, matching the elite mover aesthetic. The composition is clean and minimalist, focusing on the craftsmanship and premium quality of the product in a high-end studio setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUswtS4b0fS86Us6QGKa13J0-tLjfAO07GnCqXQJK9b2K0CHWL9emHbhmL4js3tp_1kW6PycKZbC0N95RC50WDjDk55oDg9bvCzdkuq8LUI488udFB0PARlXOibnTnEPZiubr6AApU95-r2r-cgJ70YGCpGa6hH4bU7nSTer1y39laCabSv5XV-JYQKHPqrQfjd2O6FdKKqAguSi3IVdWx3HdvC8SioHyNnmMPtNjd_m0cDKN4U9-s97K2iqrwULiY_fMzSWR-_yAF"/>
</div>
<!-- Scanning Overlay UI -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center">
<!-- Instruction Text -->
<div class="absolute top-12 left-0 w-full text-center px-container-margin">
<h2 class="font-headline-md text-headline-md-mobile text-primary-fixed mb-2">Scan your RunBonus shoes</h2>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto">Position the QR code inside the frame to verify your authentic gear.</p>
</div>
<!-- Scanning Frame -->
<div class="relative w-[280px] h-[280px] md:w-[320px] md:h-[320px] group transition-transform duration-500 hover:scale-105">
<!-- Inner Glow for the "Glass" feel -->
<div class="absolute inset-0 bg-primary-fixed/5 backdrop-blur-[2px] rounded-xl border border-white/10"></div>
<!-- Corners -->
<div class="scanner-corner scanner-corner-tl"></div>
<div class="scanner-corner scanner-corner-tr"></div>
<div class="scanner-corner scanner-corner-bl"></div>
<div class="scanner-corner scanner-corner-br"></div>
<!-- Animated Line -->
<div class="scanning-line"></div>
<!-- Success indicator (hidden by default) -->
<div class="absolute inset-0 border-4 border-primary-fixed rounded-xl opacity-0 scale-110 transition-all duration-300 flex items-center justify-center" id="success-ring">
<span class="material-symbols-outlined text-primary-fixed text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Bottom Controls -->
<div class="absolute bottom-16 flex flex-col items-center gap-8">
<!-- Flashlight Toggle -->
<button class="flex flex-col items-center gap-2 group" id="flash-btn" onclick="toggleFlash()">
<div class="w-16 h-16 rounded-full border border-outline-variant/30 backdrop-blur-md bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-all group-active:scale-90">
<span class="material-symbols-outlined text-on-surface text-3xl" id="flash-icon">flashlight_on</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant tracking-widest uppercase">Flashlight</span>
</button>
<!-- Help Link -->
<a class="font-label-sm text-label-sm text-primary-fixed border-b border-primary-fixed/30 pb-1" href="#">Can't find the code?</a>
</div>
</div>
<!-- Ambient Vignette -->
<div class="absolute inset-0 pointer-events-none shadow-[inset_0_0_150px_rgba(0,0,0,0.9)] z-0"></div>
</main>
<!-- Success Feedback Overlay (Hidden) -->
<div class="fixed inset-0 z-[60] bg-background/95 backdrop-blur-2xl flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500" id="auth-success">
<div class="w-24 h-24 rounded-full bg-primary-fixed flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(195,244,0,0.4)]">
<span class="material-symbols-outlined text-on-primary-fixed text-5xl font-bold">verified</span>
</div>
<h3 class="font-display-lg text-display-lg text-primary-fixed mb-2">Authentic Gear</h3>
<p class="font-body-lg text-on-surface-variant mb-12">Pairing your RunBonus Pro-Move Shoes...</p>
<button class="px-12 py-4 bg-primary-fixed text-on-primary-fixed font-bold rounded-full hover:scale-105 active:scale-95 transition-transform" onclick="location.reload()">CONTINUE TO DASHBOARD</button>
</div>
<script>
        // Micro-interaction for flashlight
        let flashOn = false;
        function toggleFlash() {
            flashOn = !flashOn;
            const btn = document.getElementById('flash-btn').querySelector('div');
            const icon = document.getElementById('flash-icon');
            
            if(flashOn) {
                btn.classList.add('bg-primary-fixed/20', 'border-primary-fixed');
                icon.innerText = 'flashlight_off';
                icon.classList.add('text-primary-fixed');
            } else {
                btn.classList.remove('bg-primary-fixed/20', 'border-primary-fixed');
                icon.innerText = 'flashlight_on';
                icon.classList.remove('text-primary-fixed');
            }
        }

        // Simulate a successful scan after 4 seconds
        setTimeout(() => {
            const successRing = document.getElementById('success-ring');
            const authSuccess = document.getElementById('auth-success');
            
            // Step 1: Visual ring animation
            successRing.classList.remove('opacity-0', 'scale-110');
            successRing.classList.add('opacity-100', 'scale-100');
            
            // Step 2: Transition to success screen
            setTimeout(() => {
                authSuccess.classList.remove('opacity-0', 'pointer-events-none');
                authSuccess.classList.add('opacity-100');
            }, 1000);
        }, 4000);

        // Add subtle mouse parallax for the frame on desktop
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const scanner = document.querySelector('.relative.w-\\[280px\\]');
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                scanner.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
    </script>
</body></html>
