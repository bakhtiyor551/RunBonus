<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-primary-fixed/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -left-[20%] w-[70%] h-[70%] bg-surface-container-highest/30 rounded-full blur-[100px]"></div>
</div>
<!-- Header Section (TopAppBar Influence) -->
<header class="w-full sticky top-0 z-40 backdrop-blur-xl bg-surface/80 border-b border-outline-variant/20 flex justify-between items-center px-container-margin py-6">
<div class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed uppercase tracking-tighter">
            RunBonus
        </div>
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-container-margin relative z-10">
<div class="w-full max-w-md space-y-8">
<!-- Hero Messaging -->
<div class="text-center space-y-2" id="step-header">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">Elevate Your Pace.</h1>
<p class="text-on-surface-variant font-body-lg text-body-lg">Enter your mobile to start earning.</p>
</div>
<!-- Login Container -->
<div class="glass-effect rounded-lg p-card-padding space-y-6 shadow-2xl relative overflow-hidden">
<!-- Phone Number Step -->
<div class="step-transition space-y-6" id="phone-step">
<div class="space-y-4">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Phone Number</label>
<div class="flex gap-3">
<!-- Country Picker -->
<div class="relative group w-24">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-full py-4 px-4 text-on-surface appearance-none focus:outline-none focus:border-primary-fixed cursor-pointer transition-all">
<option>+1</option>
<option>+44</option>
<option>+49</option>
<option>+33</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant group-focus-within:text-primary-fixed">expand_more</span>
</div>
<!-- Phone Input -->
<div class="flex-1 input-glow group bg-surface-container-low border border-outline-variant rounded-full flex items-center px-6 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 py-4 text-on-surface placeholder:text-outline-variant/60 font-medium" placeholder="000 000 0000" type="tel"/>
</div>
</div>
</div>
</div>
<!-- OTP Step (Hidden by default) -->
<div class="step-transition hidden opacity-0 translate-y-4 space-y-6" id="otp-step">
<div class="space-y-4">
<div class="flex justify-between items-end ml-1">
<label class="block text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">Verification Code</label>
<button class="text-label-sm font-label-sm text-primary-fixed hover:underline decoration-2 underline-offset-4" onclick="switchStep('phone')">Change Phone</button>
</div>
<div class="flex justify-between gap-2">
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center bg-surface-container-low border border-outline-variant rounded-xl text-display-lg-mobile font-bold focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none transition-all" maxlength="1" type="text"/>
</div>
<div class="text-center">
<button class="text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">Didn't receive code? <span class="text-primary-fixed">Resend in 0:59</span></button>
</div>
</div>

<span id="cta-text">Continue</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>

                </p>

<span class="text-label-sm font-label-sm">Google</span>

<button class="flex items-center justify-center gap-3 bg-surface-container rounded-full py-4 border border-outline-variant/20 hover:bg-surface-container-high transition-colors">

<footer class="w-full py-8 px-container-margin mt-auto">
<div class="flex justify-center items-center gap-8 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<span class="font-display-lg text-primary-fixed opacity-50 text-[14px]">ELITE MOVER ADMIN PROFILE</span>
<span class="font-display-lg text-primary-fixed opacity-50 text-[14px]">PRO TIER PERFORMANCE</span>
<span class="font-display-lg text-primary-fixed opacity-50 text-[14px]">FINTECH INTEGRATED</span>
</div>
</footer>
<script>
        let currentStep = 'phone';

        function switchStep(step) {
            const phoneStep = document.getElementById('phone-step');
            const otpStep = document.getElementById('otp-step');
            const headerTitle = document.querySelector('#step-header h1');
            const headerSub = document.querySelector('#step-header p');
            const ctaText = document.getElementById('cta-text');

            if (step === 'otp') {
                phoneStep.classList.add('hidden', 'opacity-0', '-translate-y-4');
                otpStep.classList.remove('hidden');
                setTimeout(() => {
                    otpStep.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
                headerTitle.innerText = "Verify Access.";
                headerSub.innerText = "Sent to +1 (555) 000-0000";
                ctaText.innerText = "Authenticate";
                currentStep = 'otp';
                document.querySelectorAll('.otp-input')[0].focus();
            } else {
                otpStep.classList.add('hidden', 'opacity-0', 'translate-y-4');
                phoneStep.classList.remove('hidden');
                setTimeout(() => {
                    phoneStep.classList.remove('opacity-0', '-translate-y-4');
                }, 50);
                headerTitle.innerText = "Elevate Your Pace.";
                headerSub.innerText = "Enter your mobile to start earning.";
                ctaText.innerText = "Continue";
                currentStep = 'phone';
            }
        }

        function handleContinue() {
            if (currentStep === 'phone') {
                switchStep('otp');
            } else {
                // Mock success animation
                const btn = document.getElementById('main-cta');
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
                setTimeout(() => {
                    window.location.reload(); // Success simulation
                }, 1500);
            }
        }

        // OTP Auto-focus logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body></html>
